name: PhishGuard DevSecOps Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

  sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit high-severity scan
        run: |
          mkdir -p docs/security
          bandit -r backend -x backend/venv,backend/tests -lll -f txt -o docs/security/bandit_report.txt

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: docs/security/bandit_report.txt

  dependency:
    name: Dependency Scan - pip-audit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pip-audit

      - name: Run dependency vulnerability scan
        run: |
          mkdir -p docs/security
          pip-audit -r backend/requirements.txt --desc --format json --output docs/security/pip_audit_report.json

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: docs/security/pip_audit_report.json

  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-cov

      - name: Run pytest with coverage
        env:
          SECRET_KEY: ci-test-secret
          MONGO_URI: mongodb://localhost:27017/phishguard_ci
        run: |
          mkdir -p docs/testing
          cd backend
          pytest tests/ -v --cov=src --cov-report=term-missing | tee ../docs/testing/pytest_coverage.txt

      - name: Upload pytest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-coverage
          path: docs/testing/pytest_coverage.txt

  dast:
    name: DAST - OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: test
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and start PhishGuard
        env:
          SECRET_KEY: ci-test-secret
          MONGO_URI: mongodb://localhost:27017/phishguard_ci
          FLASK_DEBUG: "false"
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          cd backend
          nohup python app.py > ../docs_security_app.log 2>&1 &
          sleep 10

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p docs/security
          docker run --network=host -v "${{ github.workspace }}/docs/security:/zap/wrk" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://127.0.0.1:5000 -r zap_report.html -I

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: docs/security/zap_report.html

  deploy:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [sast, dependency, test, dast]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deployment approval point
        run: |
          echo "All DevSecOps checks completed."
          echo "Ready for deployment to the approved staging/production environment."
